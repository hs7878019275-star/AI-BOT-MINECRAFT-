<!DOCTYPE html>
<html>
<head>
    <title>AEBoi91 GOD CONSOLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #050505; color: #00ffaa; font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        .box { border: 2px solid #00ffaa; padding: 15px; border-radius: 15px; background: #111; max-width: 500px; margin: auto; box-shadow: 0 0 20px #00ffaa33; }
        #log { height: 150px; background: #000; overflow-y: auto; border: 1px solid #222; margin: 10px 0; padding: 8px; font-size: 10px; color: #0f0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 4px 0; background: #000; border: 1px solid #00ffaa; color: #fff; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
        button { cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 11px; }
        button:active { transform: scale(0.95); background: #00ffaa; color: #000; }
        .red { border-color: #ff4444; color: #ff4444; }
        .gold { border-color: #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; margin:0 0 10px 0;">AEBoi91 GOD MODE</h2>
        <div id="log">System Ready. Waiting for connection...</div>
        
        <div class="grid">
            <input type="text" id="h" placeholder="IP: lol_smp.aternos.me">
            <input type="number" id="p" placeholder="Port: 18949">
        </div>
        <button onclick="update()">⚡ INITIALIZE BOT</button>

        <hr style="border: 0.5px solid #222;">

        <div class="grid">
            <button class="red" onclick="cmd('guard')">⚔️ KILLAURA (ON)</button>
            <button onclick="cmd('grind')">🐮 MOB GRINDER</button>
            <button class="gold" onclick="cmd('follow')">🏃 FOLLOW ME</button>
            <button onclick="cmd('stop')">🛑 STOP ALL</button>
            <button onclick="cmd('eat')">🍎 AUTO-EAT</button>
            <button onclick="cmd('armor')">🛡️ AUTO-ARMOR</button>
            <button onclick="cmd('xray')">💎 FIND ORES</button>
            <button onclick="cmd('twerk')">🍑 TWERK MODE</button>
        </div>

        <input type="text" id="ai" placeholder="Ask Gemini AI (e.g. 'Build a house')">
        <button style="background: #00ffaa; color: #000;" onclick="ask()">🧠 EXECUTE AI BRAIN</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function update() { socket.emit('update', { host: document.getElementById('h').value, port: parseInt(document.getElementById('p').value) }); }
        function cmd(type) { socket.emit('mode', type); }
        function ask() { socket.emit('ai', document.getElementById('ai').value); document.getElementById('ai').value=''; }
        socket.on('chat', m => { const l=document.getElementById('log'); l.innerHTML+=`<div>${m}</div>`; l.scrollTop=l.scrollHeight; });
    </script>
</body>
</html>
